# SIKATIN — 410 Gone for WordPress ghost URL patterns + bot mitigation
# Date: 2026-04-23
# Context: Google Search Console flagged 2 pending URL patterns under
#   /wp-content/themes/astra/* and /wp-content/uploads/*.
#   These are ghost URLs from the domain's pre-SIKATIN history (when the
#   domain was likely hosted on WordPress). Site is now static HTML —
#   no WordPress, no PHP.
#
# Action: Return 410 Gone for all WordPress paths + *.php + known attack
#   vectors (xmlrpc, admin-ajax, install.php, etc). Side benefit:
#   mitigate automated bot attacks targeting common WP exploit paths.
#
# Applied at: /etc/nginx/sites-enabled/sikatin
# Backup before edit: /root/sikatin.bak-pre-wpcontent-410-20260423-1401
#
# Also: removed dead `location ~ \.php$ { fastcgi_pass ... }` block since
#   site is 100% static HTML (no PHP runtime needed). Admin-chat API uses
#   Node.js on port 5000 via proxy, not PHP-FPM.
#
# Expected resolution: 2-4 weeks for Google to update index (410 = permanent
# removal signal, faster than 404).

# T15-wp-410: WordPress ghost URL patterns + bot mitigation (2026-04-23)
location ^~ /wp-content/  { return 410; }
location ^~ /wp-admin/    { return 410; }
location ^~ /wp-includes/ { return 410; }
location ^~ /xmlrpc.php   { return 410; }
location = /wp-login.php  { return 410; }
location ~* \.php$        { return 410; }
