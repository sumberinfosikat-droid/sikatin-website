# SIKATIN — Aggressive cache headers (T15 Fix C)
# Date: 2026-04-21
# Applied at: /etc/nginx/sites-enabled/sikatin
# Backup before edit: /root/sikatin.bak-pre-cache-20260421-0039
#
# Policy:
#   - CSS/JS/images/fonts: 1 year immutable cache (cache-bust via ?v= query)
#   - HTML: no-cache (content updates reflect immediately)
#
# Impact: repeat-visit page load ~10x faster for static assets

location ~* \.html$ {
    add_header Cache-Control "no-cache, must-revalidate";
    # Existing: include /etc/nginx/snippets/sikatin-security.conf;
}

# Auto-serve WebP when available + aggressive cache
location ~* ^(.+)\.(jpg|jpeg|png)$ {
    expires 1y;
    add_header Cache-Control "public, immutable, max-age=31536000";
    add_header Vary Accept;
    access_log off;
    set $img_path $1;
    try_files ${img_path}.webp $uri =404;
}

# CSS/JS — cache-busting via ?v= query
location ~* \.(css|js)$ {
    expires 1y;
    add_header Cache-Control "public, immutable, max-age=31536000";
    access_log off;
}

# Fonts + other static assets
location ~* \.(gif|ico|svg|woff|woff2|webp)$ {
    expires 1y;
    add_header Cache-Control "public, immutable, max-age=31536000";
    access_log off;
}

# Sitemap — no-cache (updates frequently)
location = /sitemap.xml {
    types { } default_type "text/xml; charset=utf-8";
    add_header Cache-Control "no-cache";
}
