<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering - SIKATIN</title>
    <meta name="description" content="Eksplorasi dunia rekayasa: dari konstruksi megastruktur, robotika, hingga tantangan energi terbarukan masa depan.">
    <meta name="keywords" content="engineering, rekayasa, teknik, robotika, infrastruktur, energi terbarukan, konstruksi">
    <meta name="author" content="SIKATIN">
    <meta property="og:title" content="Engineering - SIKATIN">
    <meta property="og:description" content="Eksplorasi dunia rekayasa: dari konstruksi megastruktur, robotika, hingga tantangan energi terbarukan masa depan.">
    <meta property="og:type" content="website">
    <link rel="canonical" href="https://sikatin.id/topik/engineering.html">
    <link rel="icon" href="../logo/BASE LOGO.png" type="image/png">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/animations.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <section class="topic-hero" style="--topic-glow: rgba(59, 130, 246, 0.06);">
        <div class="container">
            <div class="topic-hero-content hero-animate">
                <div class="topic-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                </div>
                <h1 class="hero-animate-delay-1">Engineering</h1>
                <p class="topic-desc hero-animate-delay-2">Dunia rekayasa dan teknik: bagaimana para insinyur merancang solusi untuk tantangan terbesar umat manusia, dari infrastruktur hingga energi masa depan.</p>
                <div class="topic-stats hero-animate-delay-3">
                    <span><strong id="topicCount">0</strong> Artikel</span>
                    <span>Diperbarui April 2026</span>
                </div>
            </div>
        </div>
    </section>

    <div class="ad-container">
        <div class="container">
            <div class="ad-slot ad-leaderboard"><!-- Google Ads: Leaderboard --></div>
        </div>
    </div>

    <section class="topic-featured" id="topicFeatured">
        <div class="container">
            <div class="topic-featured-inner" id="featuredContent"></div>
        </div>
    </section>

    <section class="section-padding">
        <div class="container">
            <div class="section-title-bar">
                <h2>Semua Artikel Engineering</h2>
                <div class="title-line"></div>
            </div>
            <div class="article-grid" id="topicArticles" style="margin-top: 32px;"></div>
        </div>
    </section>

    <div class="ad-container" style="background: var(--bg-secondary); border-top: 1.5px solid var(--border-color); padding: 24px 0;">
        <div class="container">
            <div class="ad-slot ad-responsive"><!-- Google Ads: Responsive --></div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="../js/articles-data.js"></script>
    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const topicArticles = articlesData.filter(a => a.category === 'Engineering');
            document.getElementById('topicCount').textContent = topicArticles.length;

            if (topicArticles.length > 0) {
                const feat = topicArticles[0];
                document.getElementById('featuredContent').innerHTML = `
                    <div class="animate-on-scroll fade-left">
                        <div class="topic-featured-badge">Artikel Utama</div>
                        <h2><a href="../${feat.url}">${feat.title}</a></h2>
                        <p class="tf-excerpt">${feat.excerpt}</p>
                        <div class="tf-meta"><span>${feat.date}</span> &middot; <span>${feat.readTime}</span></div>
                        <a href="../${feat.url}" class="read-more" style="margin-top: 16px;">Baca Selengkapnya <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg></a>
                    </div>
                    <a href="../${feat.url}" class="tf-thumb animate-on-scroll fade-right">
                        <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
                    </a>`;
            }

            const remaining = topicArticles.slice(1);
            const grid = document.getElementById('topicArticles');
            grid.innerHTML = remaining.map(a => `
                <div class="card animate-on-scroll">
                    <div class="card-thumbnail"><div class="card-thumbnail-placeholder"><svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg></div></div>
                    <div class="card-body">
                        <span class="card-category">${a.category}</span>
                        <h3 class="card-title"><a href="../${a.url}">${a.title}</a></h3>
                        <p class="card-excerpt">${a.excerpt}</p>
                        <div class="card-meta"><span><span class="dot"></span> ${a.date}</span><span>${a.readTime}</span></div>
                    </div>
                </div>`).join('');

            initScrollAnimations();
        });
    </script>
</body>
</html>
